name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check engine/ editor/ --select E,F,W,I

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Install virtual display (headless Pygame)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xvfb

      - name: Run tests
        run: xvfb-run -a pytest tests/ -v --cov=engine/core --cov-report=term-missing
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
