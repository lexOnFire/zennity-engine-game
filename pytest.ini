[pytest]
# Garante que pygame nao tente abrir display antes de qualquer import
env =
    SDL_VIDEODRIVER=dummy
    SDL_AUDIODRIVER=dummy
    PYGAME_HIDE_SUPPORT_PROMPT=1

# Resolve imports como 'from engine.core import ...' sem instalar o pacote
pythonpath = .

testpaths = tests
addopts = -v --tb=short
